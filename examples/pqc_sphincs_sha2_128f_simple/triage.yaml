harnesses:
  sign:
    varlat: public
    verdict: accepted-variable-time
    note: >
      SPHINCS+ attribution review: treehashx1 (utilsx1.c:67 auth-path sibling
      check) and wots_gen_leafx1 (wotsx1.c:28 signing leaf selection,
      wotsx1.c:57 WOTS chain step save) are conditioned on signature/public
      state derived during signing, not accepted as function-wide safe names.
      R is computed from SK_PRF at sign.c:124 and is published in the signature;
      hash_message at sign.c:127 derives mhash/tree/idx_leaf from R, pk, and m.
      Split-taint probes show that SK_PRF, PUB_SEED, root, and full-sk taints
      surface the same tree/WOTS branch family, while SK_SEED-only leaves only
      the WOTS chain-save branch. A declassification probe that marks R, mhash,
      tree, idx_leaf, and intermediate roots public before tree/WOTS traversal
      clears the findings. This override is narrow to this harness/data flow;
      do not register treehashx1 or wots_gen_leafx1 wholesale.
