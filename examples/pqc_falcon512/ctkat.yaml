project:
  name: pqclean_falcon512
  language: c
  root: ..

build:
  command: "true"
  workdir: .

# PQClean Falcon-512 signing feasibility target.
#
# Private key encoding in clean/pqclean.c:
#   sk[0]        = public format/header byte
#   sk[1..1280] = encoded private f, g, F
#
# We taint only sk[1..] for the first pass. Full-sk taint would mark the public
# header secret and immediately create a false branch finding at the format
# check in do_sign().
ct:
  workdir: .
  generated_dir: ./_generated
  cflags: [-std=c99, -O0, -g, -fno-inline, -fno-omit-frame-pointer, -DPQCLEAN_NO_GLIBC_RANDOMBYTES]
  harnesses:
    - name: sign
      template: sign
      header: api.h
      prefix: "PQCLEAN_FALCON512_CLEAN_"
      secret_regions:
        - {offset: "1", length: "PQCLEAN_FALCON512_CLEAN_CRYPTO_SECRETKEYBYTES - 1",
           comment: "encoded private f, g, F; sk[0] is public format header"}
      include_dirs:
        - clean
        - ../pqc_mlkem768/common
      sources:
        - clean/codec.c
        - clean/common.c
        - clean/fft.c
        - clean/fpr.c
        - clean/keygen.c
        - clean/pqclean.c
        - clean/rng.c
        - clean/sign.c
        - clean/vrfy.c
        - ../pqc_mlkem768/common/fips202.c
        - ../pqc_mlkem768/common/randombytes.c

dudect:
  enabled: true
  # Falcon-512 signing: Gaussian sampler + Falcon's own SHAKE PRNG (clean/rng.c)
  # seeded through the weak randombytes override. Signature length is variable
  # (<= CRYPTO_BYTES). Needs -std=c99 like the ct build. Modest committed
  # default — NOT paper-grade.
  measurements: 1000
  warmup: 50
  batches: 10
  clock: auto
  seed: 0xC0FFEE
  threshold_warning: 4.5
  threshold_fail: 10.0
  workdir: .
  generated_dir: ./_generated_dudect
  compiler:
    cc: gcc
    cflags: [-std=c99, -O2, -g, -fno-omit-frame-pointer, -fno-lto]
  harnesses:
    - name: sign
      template: sign
      header: api.h
      prefix: "PQCLEAN_FALCON512_CLEAN_"
      include_dirs: [clean, ../pqc_mlkem768/common]
      sources:
        # common/randombytes.c omitted → weak override (seeded) is sole def.
        - clean/codec.c
        - clean/common.c
        - clean/fft.c
        - clean/fpr.c
        - clean/keygen.c
        - clean/pqclean.c
        - clean/rng.c
        - clean/sign.c
        - clean/vrfy.c
        - ../pqc_mlkem768/common/fips202.c

report:
  output_dir: ./reports

matrix:
  compilers: [gcc, clang]
  ct_cflags:
    debug:   [-std=c99, -O0, -g, -fno-inline, -fno-omit-frame-pointer]
    opt1:    [-std=c99, -O1, -g, -fno-omit-frame-pointer, -fno-lto]
    release: [-std=c99, -O2, -g, -fno-omit-frame-pointer, -fno-lto]
    opt3:    [-std=c99, -O3, -g, -fno-omit-frame-pointer, -fno-lto]
