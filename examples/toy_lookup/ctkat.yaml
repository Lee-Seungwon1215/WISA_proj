project:
  name: toy_lookup
  language: c
  root: .

build:
  command: "true"
  workdir: .

ct:
  workdir: .
  generated_dir: ./_generated
  harnesses:
    - name: leaky
      template: generic
      extra_headers: [lookup.h]
      include_dirs: [include]
      sources: [src/lookup.c]
      function: leaky_lookup
      return_type: void
      args: [secret, out, "sizeof(secret)"]
      buffers:
        - {name: secret, size: "16", role: secret}
        - {name: out,    size: "16", role: output}

    - name: safe
      template: generic
      extra_headers: [lookup.h]
      include_dirs: [include]
      sources: [src/lookup.c]
      function: safe_lookup
      return_type: void
      args: [secret, out, "sizeof(secret)"]
      buffers:
        - {name: secret, size: "16", role: secret}
        - {name: out,    size: "16", role: output}

report:
  output_dir: ./reports

# Phase D corpus: compiler × cflags sweep. The secret-indexed S-box read
# (leaky_lookup) is a cache-timing memory-access leak that survives every build
# — a clean `ct-leak` demonstrator vs `safe_lookup` (robust).
matrix:
  compilers: [gcc, clang]
  ct_cflags:
    debug:   [-O0, -g, -fno-inline, -fno-omit-frame-pointer]
    opt1:    [-O1, -g, -fno-omit-frame-pointer, -fno-lto]
    release: [-O2, -g, -fno-omit-frame-pointer, -fno-lto]
    opt3:    [-O3, -g, -fno-omit-frame-pointer, -fno-lto]
    size:    [-Os, -g, -fno-omit-frame-pointer, -fno-lto]
