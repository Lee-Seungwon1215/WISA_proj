project:
  name: pqclean_mlkem768
  language: c
  root: .

build:
  # All sources are passed through the generator; no separate make stage.
  command: "true"
  workdir: .

ct:
  workdir: .
  generated_dir: ./_generated
  cflags:
    - -O0
    - -g
    - -fno-inline
    - -fno-omit-frame-pointer
    - -DPQCLEAN_NO_GLIBC_RANDOMBYTES
  harnesses:
    - name: kem_dec
      template: kem
      # api.h gives us the *_CRYPTO_*BYTES macros; params.h provides the
      # internal KYBER_INDCPA_SECRETKEYBYTES / KYBER_SYMBYTES values used
      # in `secret_regions` below.
      header: api.h
      extra_headers: [params.h]
      prefix: "PQCLEAN_MLKEM768_CLEAN_"
      # ML-KEM stores `pk` and `H(pk)` inside `sk` (FIPS 203 §7.1). Only the
      # ranges below are actually secret; the public bytes in between are
      # legitimately consumed by re-encryption (rej_uniform on the seed),
      # which would otherwise produce false-positive findings.
      secret_regions:
        - {offset: "0", length: "KYBER_INDCPA_SECRETKEYBYTES",
           comment: "indcpa secret polynomial s"}
        - {offset: "KYBER_SECRETKEYBYTES - KYBER_SYMBYTES", length: "KYBER_SYMBYTES",
           comment: "FO rejection seed z"}
      include_dirs:
        - clean
        - common
      sources:
        - clean/kem.c
        - clean/indcpa.c
        - clean/poly.c
        - clean/polyvec.c
        - clean/ntt.c
        - clean/reduce.c
        - clean/cbd.c
        - clean/symmetric-shake.c
        - clean/verify.c
        - common/fips202.c
        - common/randombytes.c

dudect:
  enabled: true
  # ML-KEM-768 dec on QEMU x86 emulation: ~50µs per call. With a fresh
  # keypair generated outside the timed region on every class-1 iteration
  # (~80µs), 10k measurements ≈ 1–2 minutes.
  measurements: 10000
  warmup: 200
  batches: 10
  clock: monotonic
  seed: 0xC0FFEE
  threshold_warning: 4.5
  threshold_fail: 10.0
  workdir: .
  generated_dir: ./_generated_dudect
  compiler:
    cc: gcc
    cflags: [-O2, -g, -fno-omit-frame-pointer, -fno-lto]
  harnesses:
    # sk-leak axis (default leak_target=sk). Name stays `kem_dec` so it
    # pairs with the ct.harnesses[name=kem_dec] entry above in the combined
    # verdict matrix.
    - name: kem_dec
      template: kem
      header: api.h
      extra_headers: [params.h]
      prefix: "PQCLEAN_MLKEM768_CLEAN_"
      include_dirs: [clean, common]
      sources:
        - clean/kem.c
        - clean/indcpa.c
        - clean/poly.c
        - clean/polyvec.c
        - clean/ntt.c
        - clean/reduce.c
        - clean/cbd.c
        - clean/symmetric-shake.c
        - clean/verify.c
        - common/fips202.c
        # T38/R1 Option B: common/randombytes.c is intentionally OMITTED for
        # the dudect harnesses. The generated timing harness ships a weak
        # `randombytes` override seeded by dudect.seed, so keypair/enc become
        # reproducible (bit-identical raw timings across runs with the same
        # seed). Linking the strong PQClean def here would shadow that weak
        # symbol and pull OS entropy, breaking the advertised reproducibility.
        # The ct/Valgrind harness above keeps it on purpose: that template has
        # no override and Valgrind is deterministic regardless.

    # ct-leak axis (Bundle D): class 0 fixed ct vs class 1 fresh ct, sk
    # held constant. Detects ct-content leaks (e.g. ct-indexed branches).
    # Pairs with no ct.harness — Valgrind has no sk/ct axis distinction.
    # NOTE: this catches common ct-leaks but NOT rare/adversarial ct triggers
    # or KyberSlash-style operand-latency leaks — see README "ct-leak 모드의
    # 본질적 한계".
    - name: kem_dec_ct
      template: kem
      leak_target: ct
      header: api.h
      extra_headers: [params.h]
      prefix: "PQCLEAN_MLKEM768_CLEAN_"
      include_dirs: [clean, common]
      sources:
        - clean/kem.c
        - clean/indcpa.c
        - clean/poly.c
        - clean/polyvec.c
        - clean/ntt.c
        - clean/reduce.c
        - clean/cbd.c
        - clean/symmetric-shake.c
        - clean/verify.c
        - common/fips202.c
        # T38/R1: common/randombytes.c omitted (weak override → reproducible);
        # see the kem_dec dudect harness above for the full rationale.

    # fo-leak axis (Bundle K / B5): class 0 valid ct (via enc) vs class 1
    # invalid ct → dec is forced down the implicit-rejection / Fujisaki-Okamoto
    # fallback path. This is the path the Valgrind structural harness CANNOT
    # cover (it only decapsulates a valid ct), so this dudect harness is the
    # timing coverage the ct verdict's B5 caveat points to.
    - name: kem_dec_fo
      template: kem
      leak_target: fo
      header: api.h
      extra_headers: [params.h]
      prefix: "PQCLEAN_MLKEM768_CLEAN_"
      include_dirs: [clean, common]
      sources:
        - clean/kem.c
        - clean/indcpa.c
        - clean/poly.c
        - clean/polyvec.c
        - clean/ntt.c
        - clean/reduce.c
        - clean/cbd.c
        - clean/symmetric-shake.c
        - clean/verify.c
        - common/fips202.c

report:
  output_dir: ./reports

# Phase D: compiler × cflags sweep for `ctkat ct-matrix` (observational, separate
# artifact — never feeds the run verdict). The ct stage's
# `-DPQCLEAN_NO_GLIBC_RANDOMBYTES` is carried into every combo automatically.
matrix:
  compilers: [gcc, clang]
  ct_cflags:
    debug:   [-O0, -g, -fno-inline, -fno-omit-frame-pointer]
    release: [-O2, -g, -fno-omit-frame-pointer, -fno-lto]
    size:    [-Os, -g, -fno-omit-frame-pointer, -fno-lto]
