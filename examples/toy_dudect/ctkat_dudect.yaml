project:
  name: toy_dudect
  language: c
  root: .

build:
  # Sources are compiled directly by the dudect harness step; no separate make.
  command: "true"
  workdir: .

dudect:
  enabled: true
  measurements: 50000
  warmup: 500
  batches: 10
  clock: monotonic       # explicit for cross-platform CI stability; `auto`
                         # (default since Bundle C) would also pick monotonic
                         # under QEMU but rdtsc on native x86_64 hosts
  seed: 0xC0FFEE
  threshold_warning: 4.5
  threshold_fail: 10.0
  workdir: .
  generated_dir: ./_generated_dudect
  compiler:
    cc: gcc
    cflags: [-O2, -g, -fno-omit-frame-pointer]
  harnesses:
    - name: leaky
      template: generic
      extra_headers: [leaky.h]
      include_dirs: [include]
      sources: [src/leaky.c]
      function: leaky_function
      return_type: int
      args: [secret, "sizeof(secret)"]
      buffers:
        - {name: secret, size: "16", role: secret}

    - name: safe
      template: generic
      extra_headers: [leaky.h]
      include_dirs: [include]
      sources: [src/leaky.c]
      function: safe_function
      return_type: int
      args: [secret, "sizeof(secret)"]
      buffers:
        - {name: secret, size: "16", role: secret}

report:
  output_dir: ./reports
